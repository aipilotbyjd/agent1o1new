services:
    pgsql:
        image: postgres:17
        ports:
            - '5432:5432'
        environment:
            POSTGRES_DB: agent1o1
            POSTGRES_USER: agent1o1
            POSTGRES_PASSWORD: secret
        volumes:
            - pgsql-data:/var/lib/postgresql/data
        healthcheck:
            test: [ 'CMD-SHELL', 'pg_isready -U agent1o1' ]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'
        volumes:
            - redis-data:/data
        healthcheck:
            test: [ 'CMD', 'redis-cli', 'ping' ]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgsql-data:
    redis-data:
